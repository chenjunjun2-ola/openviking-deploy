image:
  repository: slp-acr-registry.cn-hangzhou.cr.aliyuncs.com/slp/volcengine-openviking
  pullPolicy: IfNotPresent
  tag: "v20260630"

imagePullSecrets:
  - name: acr-registry-secret

service:
  type: ClusterIP
  port: 1933

ingress:
  enabled: true
  className: higress
  # Leave host empty to match any host (direct IP access)
  host: ""
  path: /
  pathType: Prefix
  annotations:
    # Higress: proxy long-running MCP requests
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "1800"
    # Higress: support SSE for MCP streaming
    higress.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  tls: []

# Public access IP (used in NOTES.txt)
gateway:
  nodePort: 31080

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

server:
  host: "0.0.0.0"
  port: 1933

# OpenViking config - stored as a Secret and mounted into the container
# Replace placeholders with actual values before deployment
openviking:
  config:
    storage:
      workspace: /app/.openviking/workspace
    log:
      level: INFO
      output: stdout
    server:
      host: "0.0.0.0"
      port: 1933
      root_api_key: "CHANGE_ME"  # TODO: Change this to your own API key
    embedding:
      dense:
        provider: dashscope
        api_key: "CHANGE_ME"  # TODO: Your DashScope API key
        model: text-embedding-v4
        dimension: 1024
      max_concurrent: 10
    vlm:
      provider: openai
      api_key: "CHANGE_ME"  # TODO: Your DashScope API key
      model: deepseek-v4-flash
      api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      max_concurrent: 64
